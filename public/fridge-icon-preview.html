<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>냉장고 아이콘 미리보기 v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      min-height: 100vh;
      gap: 12px;
    }
    h1 { font-size: 18px; color: #ff9966; }
    p  { font-size: 13px; color: #888; margin-bottom: 28px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 560px;
    }
    .card {
      background: #2d2d2d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .label {
      font-size: 13px;
      font-weight: 700;
      color: #ff9966;
      letter-spacing: 0.04em;
    }
    .icon-row {
      display: flex;
      align-items: flex-end;
      gap: 20px;
    }
    .size-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .size-label { font-size: 10px; color: #555; }

    /* 헤더 시뮬레이션 */
    .header-sim {
      background: #242424;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 7px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #666;
      width: 100%;
      justify-content: center;
    }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .badge {
      position: absolute;
      top: -3px; right: -3px;
      width: 15px; height: 15px;
      background: #f44336;
      border-radius: 50%;
      font-size: 9px; color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
    }
  </style>
</head>
