<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 숟가락 + 혀 — 위에서 본 숟가락, 혀가 국자 부분을 핥음 -->
  <!-- 숟가락 국자 테두리 -->
  <ellipse cx="16" cy="12" rx="9.5" ry="8.5" fill="none" stroke="#bbb" stroke-width="2.5"/>
  <!-- 숟가락 손잡이 -->
  <rect x="14.5" y="20" width="3" height="10" rx="1.5" fill="#bbb"/>
  <!-- 혀 (숟가락 국자 위에 올라탐) -->
  <path d="M12 12 C11 8 13 5 16 5 C19 5 21 8 20 12 C20 15.5 18 17 16 17 C14 17 12 15.5 12 12Z" fill="#ff9966"/>
  <line x1="16" y1="7.5" x2="16" y2="16.5" stroke="#cc5500" stroke-width="1.4" stroke-linecap="round"/>
</svg>
