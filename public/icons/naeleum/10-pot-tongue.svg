<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 냄비 + 혀 — 뚜껑 틈새로 혀 삐져나옴 -->
  <!-- 냄비 몸통 -->
  <path d="M5 17 L5 27 C5 28.5 9.5 30 16 30 C22.5 30 27 28.5 27 27 L27 17Z" fill="#888"/>
  <!-- 냄비 테두리 타원 -->
  <ellipse cx="16" cy="17" rx="11" ry="2.5" fill="#999"/>
  <!-- 왼쪽 손잡이 -->
  <path d="M5 20 C2 20 1.5 24 3.5 24 L5 23" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 오른쪽 손잡이 -->
  <path d="M27 20 C30 20 30.5 24 28.5 24 L27 23" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 혀 (뚜껑과 냄비 사이에서 나옴) -->
  <path d="M12.5 17 C11.5 13 13.5 7.5 16 7.5 C18.5 7.5 20.5 13 19.5 17Z" fill="#ff9966"/>
  <line x1="16" y1="9.5" x2="16" y2="16.5" stroke="#cc5500" stroke-width="1.3" stroke-linecap="round"/>
  <!-- 뚜껑 (살짝 기울어짐, 혀 기반부 가림) -->
  <path d="M4.5 13 Q16 8.5 27.5 13 Q26.5 15.5 16 16.5 Q5.5 15.5 4.5 13Z" fill="#aaa"/>
  <!-- 뚜껑 손잡이 -->
  <ellipse cx="16" cy="11.5" rx="2.5" ry="1.5" fill="#999"/>
  <rect x="14.8" y="9" width="2.4" height="2.5" rx="1.2" fill="#999"/>
</svg>
