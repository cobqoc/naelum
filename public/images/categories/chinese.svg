<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- 그릇 그림자 -->
  <ellipse cx="20" cy="37" rx="13" ry="2.5" fill="#000" opacity="0.15"/>

  <!-- 그릇 외부 (청자 느낌 연회색-그린) -->
  <circle cx="20" cy="20" r="17" fill="url(#bowl-grad)"/>

  <!-- 그릇 내부 (짜장 소스 검정) -->
  <circle cx="20" cy="20" r="14" fill="#1a0a00"/>

  <!-- 짜장 소스 광택 -->
  <ellipse cx="14" cy="15" rx="5" ry="3" fill="#2d1200" opacity="0.6"/>

  <!-- 면 베이스 (갈색 원형 더미) -->
  <circle cx="20" cy="20" r="8" fill="#7c3d10"/>

  <!-- 면 결 (곡선 라인들) -->
  <path d="M13,18 Q16,16 19,18 Q22,20 25,18 Q27,17 28,19" stroke="#a0522d" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M13,20 Q16,18 19,20 Q22,22 25,20 Q27,19 28,21" stroke="#a0522d" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M14,22 Q17,20 20,22 Q23,24 26,22 Q27,21 28,23" stroke="#a0522d" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M15,17 Q18,15 21,17 Q24,19 26,17" stroke="#8b4513" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M14,24 Q17,22 20,24 Q23,26 26,24" stroke="#8b4513" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- 면 위 짜장 소스 (광택) -->
  <ellipse cx="20" cy="20" rx="8" ry="7" fill="#3d1a00" opacity="0.4"/>

  <!-- 오이 채 (연두색) -->
  <rect x="16" y="15" width="8" height="1.5" rx="0.7" fill="#7ec850" transform="rotate(-10,20,15.5)"/>
  <rect x="17" y="17" width="7" height="1.5" rx="0.7" fill="#6dbf3e" transform="rotate(5,20,17.5)"/>

  <!-- 그릇 줄무늬 (청자 패턴) -->
  <circle cx="20" cy="20" r="14" fill="none" stroke="#3d5a3e" stroke-width="0.4" opacity="0.5" stroke-dasharray="1.5,2.2"/>
  <circle cx="20" cy="20" r="16" fill="none" stroke="#3d5a3e" stroke-width="0.4" opacity="0.4" stroke-dasharray="1.5,2.5"/>

  <!-- 젓가락 (오른쪽 위에서 내려옴) -->
  <line x1="28" y1="2" x2="24" y2="14" stroke="#8b4513" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="31" y1="3" x2="26" y2="14" stroke="#a0522d" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 젓가락에 걸린 면 -->
  <path d="M25,13 Q27,11 26,9 Q25,7 27,6" stroke="#a0522d" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M25.5,13 Q28,12 27.5,10 Q27,8 29,7" stroke="#7c3d10" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- 그릇 테두리 -->
  <circle cx="20" cy="20" r="17" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.6"/>

  <!-- 그릇 상단 하이라이트 -->
  <path d="M8,9 Q20,4 32,9" stroke="#c8d8c0" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>

  <defs>
    <radialGradient id="bowl-grad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c8d8c0"/>
      <stop offset="60%" stop-color="#8faa84"/>
      <stop offset="100%" stop-color="#4a6741"/>
    </radialGradient>
  </defs>
</svg>
