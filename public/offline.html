<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오프라인 - 낼름</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 {
      font-size: 1.5rem;
      font-weight: bold;
      color: #ff9966;
      margin-bottom: 0.75rem;
    }
    p {
      color: #b8b8b8;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #ff9966;
      color: #1a1a1a;
      border: none;
      border-radius: 9999px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }
    .retry-btn:hover { background: #ffaa77; }
    .cached-hint {
      margin-top: 2rem;
      padding: 1rem;
      background: #2d2d2d;
      border-radius: 1rem;
      font-size: 0.875rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결을 확인해주세요.<br>이전에 방문한 레시피는 오프라인에서도 볼 수 있습니다.</p>
    <a href="/" class="retry-btn">다시 시도</a>
    <div class="cached-hint">
      💡 자주 보는 레시피를 저장하면 오프라인에서도 확인할 수 있어요
    </div>
  </div>
</body>
</html>
