version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      sentry:
        patterns: ["@sentry/*"]
      supabase:
        patterns: ["@supabase/*"]
      next:
        patterns: ["next", "react", "react-dom", "@types/react*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
